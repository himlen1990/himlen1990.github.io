name: 自动部署文档
on:
  push:
    branches:
      - main  # 只有当 main 分支有变动时才触发

permissions:
  contents: write  # 赋予机器人写入 gh-pages 分支的权限

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: 安装 MkDocs 和 Material 主题
        run: |
          pip install mkdocs-material
          # 如果你用了其他插件，可以在这里继续 pip install

      - name: 部署到 GitHub Pages
        run: mkdocs gh-deploy --force